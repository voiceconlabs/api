name: Production Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_TAG: voiceconf-api-${{ github.sha }}

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v2

      - name: Generate .env for db
        run: |
          envsubst "`printf '${%s} ' $(sh -c "env|cut -d'=' -f1")`" < example.env > .env
          echo "$(cat .env)"
        env:
          NODE_ENV: production
          PORT: 3700

          MONGODB_URI: ${{ secrets.MONGODB_URI }}

          JWT_SECRET: ${{ secrets.JWT_SECRET }}

          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}

          FRONTEND_URL: https://voiceconf.io
          CORS_ORIGIN: https://voiceconf.io

          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: VoiceConf <hello@voiceconf.io>

      - name: Logging to docker
        run: docker login -u voiceconf -p ${{secrets.DOCKER_PASSWORD}}

      - name: Build the docker image
        run: docker build . --file Dockerfile --tag voiceconf/main:${{ env.IMAGE_TAG }}

      - name: Docker Push
        run: docker push voiceconf/main:${{ env.IMAGE_TAG }}

  Deploy:
    needs: Build

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Logging to docker
        run: docker login -u voiceconf -p ${{secrets.DOCKER_PASSWORD}}

      - name: Deploy To Server
        uses: appleboy/ssh-action@v1.0.0
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH }}
          envs: IMAGE_TAG
          script: |
            echo "Logging to docker hub"
            docker login -u voiceconf -p ${{secrets.DOCKER_PASSWORD}}

            echo "Stopping previous build"
            docker stop voiceconf-api || true

            echo "Removing previous build"
            docker rm voiceconf-api || true

            echo "Removing old image from local"
            docker images | grep voiceconf-api | awk '{print $1":"$2}' | xargs -r docker rmi || true

            echo "Pulling latest image from docker hub"
            docker pull voiceconf/main:$IMAGE_TAG

  Run:
    needs: Deploy

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Logging to docker
        run: docker login -u voiceconf -p ${{secrets.DOCKER_PASSWORD}}

      - name: Deploy To Server
        uses: appleboy/ssh-action@v1.0.0
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH }}
          envs: IMAGE_TAG
          script: |
            echo "Logging to docker hub"
            docker login -u voiceconf -p ${{secrets.DOCKER_PASSWORD}}

            echo "Starting latest build"

            docker run -e NODE_ENV=production -d \
              --restart always \
              -p 9300:3700 \
              --name voiceconf-api \
              voiceconf/main:$IMAGE_TAG

            echo "Deploy Done"
